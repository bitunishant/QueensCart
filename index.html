<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QueensMart — Shop & Sell Among Queens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style> 
:root{
  --plum:#3E1238;
  --plum-deep:#2A0C26;
  --burgundy:#7A2048;
  --rose-gold:#B76E79;
  --blush:#F7E1E8;
  --ivory:#FFF9F2;
  --gold:#C9A227;
  --gold-light:#E8CD7A;
  --ink:#2A1726;
  --muted:#8A6E7E;
  --success:#3E7A52;
  --warn:#B8742E;
  --danger:#A33B4A;
  --radius:16px;
  --shadow: 0 8px 28px rgba(62,18,56,.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--ivory);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.serif{font-family:'Playfair Display',serif;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none !important;}
::selection{background:var(--gold-light);color:var(--plum-deep);}

/* scrollbar polish */
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-thumb{background:var(--rose-gold);border-radius:8px;}

/* ---------- Crown / filigree decorations ---------- */
.crown-divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 22px;color:var(--gold);}
.crown-divider .line{height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.crown-mini{width:18px;height:18px;}

/* ---------- LOGIN MODAL ---------- */
#loginScreen{
  position:fixed;inset:0;
  display:none;align-items:center;justify-content:center;
  background:rgba(42,12,38,.78);
  padding:24px;
  z-index:500;
  overflow-y:auto;
}
#loginScreen.open{display:flex;}

.login-card{
  position:relative;
  z-index:2;
  background:rgba(255,249,242,.99);
  border-radius:24px;
  padding:44px 36px 36px;
  width:100%;max-width:420px;
  box-shadow:0 30px 80px rgba(0,0,0,.45);
  text-align:center;
  border:1px solid rgba(201,162,39,.35);
  margin:20px 0;
}
.login-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;color:var(--muted);}
.logo-mark{
  width:64px;height:64px;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--gold-light),var(--gold));
  border-radius:50%;
  box-shadow:0 6px 18px rgba(201,162,39,.45);
}
.logo-mark svg{width:34px;height:34px;}
.brand-name{font-size:30px;font-weight:800;letter-spacing:.5px;color:var(--plum-deep);margin:0 0 4px;}
.tagline{color:var(--rose-gold);font-size:13.5px;font-weight:600;letter-spacing:.6px;margin:0 0 28px;text-transform:uppercase;}

.role-toggle{display:flex;background:var(--blush);border-radius:999px;padding:4px;margin-bottom:22px;}
.role-toggle button{
  flex:1;border:none;background:transparent;padding:10px 0;border-radius:999px;
  font-weight:600;font-size:14px;color:var(--muted);transition:.25s;
}
.role-toggle button.active{background:var(--plum);color:#fff;box-shadow:0 4px 12px rgba(62,18,56,.3);}

.login-card input{
  width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid #ECD9DD;
  margin-bottom:12px;font-size:14px;background:#fff;color:var(--ink);
}
.login-card input:focus{outline:none;border-color:var(--rose-gold);}
.btn-primary{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(120deg,var(--burgundy),var(--plum));
  color:#fff;font-weight:700;font-size:15px;letter-spacing:.3px;
  box-shadow:0 10px 24px rgba(122,32,72,.35);
  margin-top:6px;transition:.2s;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(122,32,72,.45);}
.login-hint{margin-top:18px;font-size:12px;color:var(--muted);}

/* ---------- APP SHELL ---------- */
#app{display:flex;min-height:100vh;flex-direction:column;}
header.topbar{
  background:linear-gradient(120deg,var(--plum-deep),var(--plum));
  color:var(--ivory);
  padding:0 24px;
  position:sticky;top:0;z-index:50;
  box-shadow:0 4px 18px rgba(0,0,0,.18);
}
.topbar-inner{display:flex;align-items:center;gap:18px;height:66px;max-width:1320px;margin:0 auto;}
.brand-mini{display:flex;align-items:center;gap:8px;font-weight:800;font-size:19px;white-space:nowrap;}
.brand-mini .crown-mini path{fill:var(--gold-light);}
.hamburger-btn{display:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;width:38px;height:38px;border-radius:10px;font-size:17px;}
nav.main-nav{display:flex;gap:4px;flex:1;overflow-x:auto;}
nav.main-nav button{
  background:transparent;border:none;color:#E9D9E3;padding:8px 14px;border-radius:999px;
  font-size:13.5px;font-weight:600;white-space:nowrap;transition:.2s;
}
nav.main-nav button:hover{background:rgba(255,255,255,.08);}
nav.main-nav button.active{background:var(--gold);color:var(--plum-deep);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.icon-btn{
  position:relative;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:#fff;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
}
.badge-count{
  position:absolute;top:-6px;right:-6px;background:var(--gold);color:var(--plum-deep);
  font-size:10px;font-weight:800;border-radius:999px;min-width:17px;height:17px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.role-pill{
  background:rgba(255,255,255,.1);border:1px solid rgba(232,205,122,.4);color:var(--gold-light);
  font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;letter-spacing:.4px;text-transform:uppercase;
}
.login-btn-top{
  background:linear-gradient(120deg,var(--gold-light),var(--gold));color:var(--plum-deep);
  border:none;font-weight:800;font-size:12.5px;padding:9px 18px;border-radius:999px;letter-spacing:.3px;
}
.logout-link{font-size:12.5px;color:#E9D9E3;opacity:.8;padding:6px 4px;}
.logout-link:hover{opacity:1;text-decoration:underline;}

@media(max-width:900px){
  .hamburger-btn{display:flex;align-items:center;justify-content:center;}
  nav.main-nav{
    position:fixed;top:66px;left:0;right:0;
    background:var(--plum-deep);
    flex-direction:column;align-items:stretch;
    padding:8px 14px 16px;
    max-height:0;overflow:hidden;
    transition:max-height .25s ease;
    box-shadow:0 12px 24px rgba(0,0,0,.25);
  }
  nav.main-nav.nav-open{max-height:420px;overflow-y:auto;}
  nav.main-nav button{text-align:left;padding:12px 14px;border-radius:10px;}
  nav.main-nav button.active{background:var(--gold);}
  .topbar-inner{gap:10px;}
  .brand-mini{font-size:16px;}
  .role-pill{display:none;}
}
@media(max-width:480px){
  .login-btn-top{padding:8px 12px;font-size:11.5px;}
  header.topbar{padding:0 14px;}
}

main{flex:1;max-width:1320px;margin:0 auto;padding:28px 24px 70px;width:100%;}
@media(max-width:600px){
  main{padding:18px 14px 60px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .pd-price{font-size:24px;}
  .login-card{padding:34px 22px 28px;}
  .admin-tabs{width:100%;overflow-x:auto;}
}

/* ---------- generic components ---------- */
.section-title{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.section-title h2{margin:0;font-size:24px;color:var(--plum-deep);}
.section-title .sub{color:var(--muted);font-size:13px;}

.banner-carousel{
  position:relative;border-radius:20px;overflow:hidden;margin-bottom:30px;height:180px;
  box-shadow:var(--shadow);
}
.banner-slide{
  position:absolute;inset:0;display:flex;align-items:center;padding:0 40px;color:#fff;
  opacity:0;transition:opacity .6s ease;
}
.banner-slide.active{opacity:1;}
.banner-slide h3{font-size:26px;margin:0 0 6px;}
.banner-slide p{margin:0;font-size:13.5px;opacity:.9;max-width:420px;}
.banner-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.banner-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;}
.banner-dots span.active{background:#fff;width:20px;border-radius:4px;}

.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.search-box{
  flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:#fff;
  border:1.5px solid #ECD9DD;border-radius:12px;padding:10px 14px;
}
.search-box input{border:none;outline:none;font-size:14px;flex:1;background:transparent;}
select.styled, .sort-select{
  border:1.5px solid #ECD9DD;background:#fff;border-radius:12px;padding:10px 14px;font-size:13.5px;font-weight:600;color:var(--plum);
}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
.chip{
  padding:8px 16px;border-radius:999px;border:1.5px solid var(--blush);background:#fff;
  font-size:12.5px;font-weight:600;color:var(--burgundy);transition:.2s;
}
.chip.active{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
.product-card{
  background:#fff;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);border:1px solid #F3E2E7;
  transition:.25s;display:flex;flex-direction:column;
}
.product-card:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(62,18,56,.18);}
.product-img{
  height:160px;position:relative;overflow:hidden;background:var(--blush);
}
.product-img img{width:100%;height:100%;object-fit:cover;display:block;}
.cat-tag{
  position:absolute;top:10px;left:10px;background:rgba(255,255,255,.9);color:var(--burgundy);
  font-size:10px;font-weight:700;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;
}
.trust-badge{
  position:absolute;top:10px;right:10px;background:var(--gold);color:var(--plum-deep);
  font-size:9.5px;font-weight:800;padding:4px 8px;border-radius:999px;
}
.product-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:5px;flex:1;}
.product-body .title{font-weight:700;font-size:14.5px;line-height:1.3;}
.product-body .seller{font-size:11.5px;color:var(--muted);}
.product-body .price{font-family:'Playfair Display',serif;font-weight:700;color:var(--burgundy);font-size:18px;margin-top:2px;}
.product-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{
  flex:1;border:none;border-radius:10px;padding:9px 0;font-size:12.5px;font-weight:700;
}
.btn-sm.ghost{background:var(--blush);color:var(--burgundy);}
.btn-sm.solid{background:var(--burgundy);color:#fff;}

.empty-state{
  text-align:center;padding:70px 20px;color:var(--muted);
}
.empty-state svg{width:54px;height:54px;margin-bottom:14px;}
.empty-state h3{color:var(--plum);margin:0 0 6px;font-size:18px;}

/* ---------- Product detail ---------- */
.pd-wrap{display:grid;grid-template-columns:1fr 1fr;gap:36px;}
@media(max-width:820px){.pd-wrap{grid-template-columns:1fr;}}
.pd-gallery-main{
  height:340px;border-radius:18px;overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);background:var(--blush);
}
.pd-gallery-main img{width:100%;height:100%;object-fit:cover;display:block;}
.pd-thumbs{display:flex;gap:8px;}
.pd-thumbs div{width:60px;height:60px;border-radius:10px;border:2px solid transparent;cursor:pointer;overflow:hidden;}
.pd-thumbs div.active{border-color:var(--gold);}
.pd-thumbs img{width:100%;height:100%;object-fit:cover;display:block;}
.pd-info h1{font-size:26px;margin:0 0 6px;color:var(--plum-deep);}
.pd-price{font-family:'Playfair Display',serif;font-size:28px;color:var(--burgundy);font-weight:700;margin:6px 0;}
.pd-seller{display:flex;align-items:center;gap:10px;background:var(--blush);border-radius:14px;padding:12px 16px;margin:14px 0;}
.pd-seller .av{width:40px;height:40px;border-radius:50%;background:var(--rose-gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.pd-seller .name{font-weight:700;font-size:14px;}
.pd-seller .meta{font-size:11.5px;color:var(--muted);}
.qty-selector{display:flex;align-items:center;gap:10px;margin:18px 0;}
.qty-selector button{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--blush);background:#fff;font-size:16px;font-weight:700;color:var(--burgundy);}
.qty-selector span{font-weight:700;font-size:15px;min-width:20px;text-align:center;}
.pd-cta{display:flex;gap:12px;margin-top:6px;}
.btn-outline{flex:1;padding:13px;border-radius:12px;border:1.5px solid var(--burgundy);color:var(--burgundy);background:transparent;font-weight:700;}
.btn-fill{flex:1;padding:13px;border-radius:12px;border:none;background:linear-gradient(120deg,var(--burgundy),var(--plum));color:#fff;font-weight:700;}

/* ---------- Cart / checkout ---------- */
.cart-row{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px;}
.cart-thumb{width:64px;height:64px;border-radius:12px;flex-shrink:0;overflow:hidden;background:var(--blush);}
.cart-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.cart-row .ci-title{font-weight:700;font-size:14px;}
.cart-row .ci-seller{font-size:11.5px;color:var(--muted);}
.cart-qty{display:flex;align-items:center;gap:8px;margin-left:auto;}
.cart-qty button{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--blush);background:#fff;font-weight:700;color:var(--burgundy);}
.cart-price{font-weight:700;color:var(--burgundy);width:80px;text-align:right;}
.remove-x{color:var(--danger);font-size:12px;font-weight:700;margin-left:14px;background:none;border:none;}

.summary-box{background:#fff;border-radius:18px;padding:22px;box-shadow:var(--shadow);position:sticky;top:90px;}
.summary-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px;color:var(--muted);}
.summary-row.total{color:var(--ink);font-weight:800;font-size:17px;border-top:1px dashed var(--blush);padding-top:12px;margin-top:8px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid .full{grid-column:1/-1;}
.form-field label{font-size:12px;font-weight:700;color:var(--plum);display:block;margin-bottom:5px;}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid #ECD9DD;font-size:13.5px;background:#fff;font-family:inherit;
}
.pay-options{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap;}
.pay-opt{flex:1;min-width:120px;border:1.5px solid #ECD9DD;border-radius:12px;padding:12px;text-align:center;font-weight:700;font-size:13px;color:var(--muted);}
.pay-opt.active{border-color:var(--burgundy);background:var(--blush);color:var(--burgundy);}

.order-confirm{text-align:center;background:#fff;border-radius:22px;padding:50px 30px;box-shadow:var(--shadow);max-width:520px;margin:30px auto;}
.order-confirm .check{width:70px;height:70px;border-radius:50%;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px;}

.order-card{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;}
.status-pill{font-size:11px;font-weight:800;padding:5px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px;}
.status-Placed{background:#FFEAD2;color:var(--warn);}
.status-Shipped{background:#DCEBFF;color:#2C5FA8;}
.status-Delivered{background:#DCF3E3;color:var(--success);}
.status-Pending{background:#FFEAD2;color:var(--warn);}
.status-Approved, .status-Live{background:#DCF3E3;color:var(--success);}
.status-Rejected{background:#FBDADF;color:var(--danger);}
.status-Active{background:#DCF3E3;color:var(--success);}
.status-Suspended{background:#FBDADF;color:var(--danger);}

/* ---------- Sell form ---------- */
.dropzone{
  border:2px dashed var(--rose-gold);border-radius:16px;padding:30px;text-align:center;color:var(--muted);
  background:var(--blush);cursor:pointer;font-size:13px;
}
.dropzone strong{color:var(--burgundy);}
.img-swatch-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.img-swatch{width:54px;height:54px;border-radius:10px;overflow:hidden;background:var(--blush);}
.img-swatch img{width:100%;height:100%;object-fit:cover;display:block;}

/* ---------- listings / profile ---------- */
.listing-row{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.listing-row .lt{width:54px;height:54px;border-radius:10px;flex-shrink:0;overflow:hidden;background:var(--blush);}
.listing-row .lt img{width:100%;height:100%;object-fit:cover;display:block;}
.kebab-actions{display:flex;gap:8px;margin-left:auto;}
.btn-mini{border:1.5px solid var(--blush);background:#fff;color:var(--burgundy);font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:8px;}
.btn-mini.danger{border-color:#F5C3CB;color:var(--danger);}

.profile-hero{
  background:linear-gradient(120deg,var(--plum-deep),var(--burgundy));color:#fff;border-radius:22px;
  padding:34px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-bottom:24px;
}
.profile-av{width:78px;height:78px;border-radius:50%;background:var(--gold);color:var(--plum-deep);font-size:30px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.badge-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.badge-chip{background:rgba(255,255,255,.15);border:1px solid rgba(232,205,122,.5);color:var(--gold-light);font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:26px;}
.stat-card{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);}
.stat-card .num{font-family:'Playfair Display',serif;font-size:28px;color:var(--plum-deep);font-weight:700;}
.stat-card .lbl{font-size:12px;color:var(--muted);font-weight:600;}

/* ---------- Admin ---------- */
.admin-tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;background:#fff;padding:6px;border-radius:14px;box-shadow:var(--shadow);width:fit-content;}
.admin-tabs button{border:none;background:transparent;padding:9px 18px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted);}
.admin-tabs button.active{background:var(--plum);color:#fff;}

table.data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
table.data-table th{background:var(--blush);color:var(--burgundy);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:12px 14px;}
table.data-table td{padding:12px 14px;border-top:1px solid #F4E8EC;font-size:13.5px;vertical-align:middle;}
table.data-table tr:hover td{background:#FFFBF6;}
.table-wrap{overflow-x:auto;border-radius:16px;}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;}
.filter-tabs button{padding:7px 16px;border-radius:999px;border:1.5px solid var(--blush);background:#fff;font-size:12.5px;font-weight:700;color:var(--burgundy);}
.filter-tabs button.active{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}
.mini-thumb{width:38px;height:38px;border-radius:8px;display:inline-block;vertical-align:middle;margin-right:8px;overflow:hidden;background:var(--blush);}
.mini-thumb img{width:100%;height:100%;object-fit:cover;display:block;}

.bar-chart{display:flex;align-items:flex-end;gap:14px;height:180px;padding:10px 6px;}
.bar-chart .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.bar-chart .bar{width:100%;max-width:36px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,var(--gold-light),var(--burgundy));}
.bar-chart .blabel{font-size:10.5px;color:var(--muted);margin-top:6px;font-weight:600;}
.bar-chart .bval{font-size:11px;color:var(--plum);font-weight:700;margin-bottom:4px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(42,12,38,.55);display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}

const PALETTE_BG = ['#7A2048','#B76E79','#3E1238','#C9A227','#A33B4A','#8A5A6E','#5C2A4D','#D08A8E'];
function colorFor(seed){
  let h=0; for(let i=0;i<seed.length;i++) h = seed.charCodeAt(i) + ((h<<5)-h);
  return PALETTE_BG[Math.abs(h)%PALETTE_BG.length];
}
function gradFor(seed){
  const c = colorFor(seed);
  return `linear-gradient(135deg, ${c}, #2A0C26)`;
}

};

  return PRODUCT_PHOTOS[p.id] || [CATEGORY_PHOTOS[p.category] || '1614881064213-180b1c28f743'];

function imgUrl(photoId, w, h){

}

const CATEGORIES = ['Fashion','Jewelry','Beauty','Home Decor','Handmade','Kids'];

  products: [

    {id:'P4', title:'Kumkumadi Glow Face Oil', imgKeyword:'faceoil,skincare,beauty', price:849, stock:20, category:'Beauty', desc:'Ayurvedic Kumkumadi oil blend with saffron and sandalwood, small-batch crafted for radiant skin.', sellerId:'QM-1001', sellerName:'Aanya Kapoor', status:'Live', sold:55},
    {id:'P5', title:'Macrame Wall Hanging "Bloom"', imgKeyword:'macrame,wallhanging,handmade', price:1099, stock:6, category:'Handmade', desc:'Hand-knotted cotton macrame wall art, cream tones with a wooden dowel, 24x18 inches.', sellerId:'QM-2002', sellerName:'Kavya Iyer', status:'Pending', sold:0},
    {id:'P6', title:'Kids Embroidered Frock — Pink', imgKeyword:'kidsdress,childrenclothing', price:799, stock:14, category:'Kids', desc:'Soft cotton frock with hand embroidery, sizes 2-6 yrs, breathable summer fabric.', sellerId:'QM-1002', sellerName:'Riya Sen', status:'Live', sold:17},
    {id:'P7', title:'Gold-dust Resin Coasters (Set of 4)', imgKeyword:'coasters,resinart,homedecor', price:599, stock:0, category:'Home Decor', desc:'Marble-effect resin coasters with real gold dust swirls, heat resistant, gift-boxed.', sellerId:'QM-1003', sellerName:'Meher Chawla', status:'Rejected', rejectReason:'Stock listed as 0 — please update before resubmission.', sold:0},

    {id:'ORD-9001', buyerId:'QM-1002', buyerName:'Riya Sen', items:[{productId:'P1', title:'Hand-painted Madhubani Earrings', qty:1, price:649, sellerName:'Aanya Kapoor'}], total:649, status:'Delivered', date:'2026-06-12'},

  ],
  cart: [], // {productId, qty}
  categories: [...CATEGORIES],
  banners: [
    {title:'Festive Sisterhood Sale', text:'Get cozy with handmade finds from fellow Queens — fresh drops every week.'},
    {title:'Zero Commission. Always.', text:'Every rupee you earn stays with you. That is the QueensMart promise.'},
    {title:'New: Kids Collection', text:'Adorable handcrafted pieces for the little royals in your life.'},

};

let view = { current:'browse', search:'', category:'All', sort:'newest', productDetailId:null, adminTab:'admindash', modTab:'Pending', sellEditId:null, sellImages:[], bannerIdx:0 };

let orderCounter = 9004;
let productCounter = 9;

/* ---------------------------------------------------------- */
/* LOGIN (guest-by-default, login is a modal) */
/* ---------------------------------------------------------- */
let loginRole = 'member';
let pendingNav = null; // {view, payload} to resume after login
let pendingAction = null; // function to call after successful login

function setLoginRole(r){
  loginRole = r;
  document.getElementById('roleMemberBtn').classList.toggle('active', r==='member');
  document.getElementById('roleAdminBtn').classList.toggle('active', r==='admin');
  document.getElementById('loginName').value = r==='admin' ? 'Devika Rao' : 'Aanya Kapoor';
  document.getElementById('loginEmail').value = r==='admin' ? 'devika@queensclub.in' : 'aanya@queensclub.in';
}

function openLoginModal(){
  document.getElementById('loginScreen').classList.add('open');
}
function closeLoginModal(){
  document.getElementById('loginScreen').classList.remove('open');
  pendingNav = null;
  pendingAction = null;
}
/* Member-only actions call this when a guest tries to use them */
function requireLogin(){
  showToast('Log in to continue as a Queens Club member 👑');
  openLoginModal();
}

function doLogin(){
  const name = document.getElementById('loginName').value.trim() || (loginRole==='admin'?'Admin Queen':'Guest Queen');
  const email = document.getElementById('loginEmail').value.trim() || 'guest@queensclub.in';
  let memberId = 'QM-1001';
  const existing = state.members.find(m=>m.email.toLowerCase()===email.toLowerCase());
  if(existing) memberId = existing.id;

  state.currentUser = { name, email, role: loginRole, memberId: loginRole==='member'?memberId:null };

  document.getElementById('loginScreen').classList.remove('open');
  applyRoleUI();

  if(pendingAction){ const act = pendingAction; pendingAction=null; pendingNav=null; act(); }
  else if(pendingNav){ navigate(pendingNav.view, pendingNav.payload); pendingNav=null; }
  else navigate(loginRole==='admin' ? 'admindash' : 'browse');
  showToast(`Welcome back, ${name.split(' ')[0]} 👑`);
}

function logout(){
  state.currentUser = null;
  state.cart = [];
  applyRoleUI();
  navigate('browse');
  showToast('Logged out — you\u2019re browsing as a guest now');
}

function applyRoleUI(){
  const role = state.currentUser ? state.currentUser.role : 'guest';
  document.getElementById('rolePill').textContent = role==='admin' ? 'Admin' : 'Member';
  document.getElementById('rolePill').classList.toggle('hidden', !state.currentUser);
  document.getElementById('loginBtnTop').classList.toggle('hidden', !!state.currentUser);
  document.getElementById('logoutLink').classList.toggle('hidden', !state.currentUser);

  document.getElementById('memberNav').classList.toggle('hidden', role==='admin');
  document.getElementById('adminNav').classList.toggle('hidden', role!=='admin');
  document.getElementById('cartIconBtn').classList.toggle('hidden', role==='admin');
}

function toggleNav(){
  document.querySelectorAll('nav.main-nav').forEach(n=>{ if(!n.classList.contains('hidden')) n.classList.toggle('nav-open'); });
}
function closeMobileNav(){
  document.querySelectorAll('nav.main-nav').forEach(n=>n.classList.remove('nav-open'));
}

/* ---------------------------------------------------------- */
/* NAVIGATION */
/* ---------------------------------------------------------- */
const MEMBER_ONLY_VIEWS = ['sell','mylistings','orders','profile','cart','checkout'];

function navigate(v, payload){
  // Guests can browse & view products freely, but member-only views require login
  if(MEMBER_ONLY_VIEWS.includes(v) && (!state.currentUser || state.currentUser.role!=='member')){
    pendingNav = { view:v, payload };
    requireLogin();
    return;
  }
  view.current = v;
  if(payload) Object.assign(view, payload);
  document.querySelectorAll('.main-nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  window.scrollTo({top:0, behavior:'smooth'});
  closeMobileNav();
  render();
}

function showToast(msg){
  const host = document.getElementById('toastHost');
  const t = document.createElement('div');
  t.className='toast';
  t.innerHTML = `✨ ${msg}`;
  host.innerHTML='';
  host.appendChild(t);
  setTimeout(()=>{ t.remove(); }, 2600);
}

function closeModal(){ document.getElementById('modalHost').innerHTML=''; }

/* ---------------------------------------------------------- */
/* HELPERS */
/* ---------------------------------------------------------- */
function fmt(n){ return '₹' + n.toLocaleString('en-IN'); }
function getProduct(id){ return state.products.find(p=>p.id===id); }
function visibleProducts(){
  return state.products.filter(p=>p.status==='Live').filter(p=>{
    const matchSearch = !view.search || p.title.toLowerCase().includes(view.search.toLowerCase());
    const matchCat = view.category==='All' || p.category===view.category;
    return matchSearch && matchCat;
  }).sort((a,b)=>{
    if(view.sort==='price-low') return a.price-b.price;
    if(view.sort==='price-high') return b.price-a.price;
    if(view.sort==='popular') return b.sold-a.sold;
    return b.id.localeCompare(a.id); // newest-ish
  });
}
function cartTotal(){
  return state.cart.reduce((sum,c)=>{ const p=getProduct(c.productId); return p? sum + p.price*c.qty : sum; },0);
}
function cartCount(){ return state.cart.reduce((s,c)=>s+c.qty,0); }

/* ============================================================
   RENDER ROUTER
   ============================================================ */
function render(){
  document.getElementById('cartCount').textContent = cartCount();
  document.getElementById('cartCount').classList.toggle('hidden', cartCount()===0);

  const main = document.getElementById('mainContent');
  main.classList.remove('lp-view');
  const v = view.current;
  if(v==='landing') return renderLanding(main);
  if(v==='browse') return renderBrowse(main);
  if(v==='product') return renderProductDetail(main);
  if(v==='cart') return renderCart(main);
  if(v==='checkout') return renderCheckout(main);
  if(v==='orderConfirm') return renderOrderConfirm(main);
  if(v==='orders') return renderMyOrders(main);
  if(v==='sell') return renderSellForm(main);
  if(v==='mylistings') return renderMyListings(main);
  if(v==='profile') return renderProfile(main);
  if(v==='admindash') return renderAdminDash(main);
  if(v==='adminmod') return renderAdminMod(main);
  if(v==='adminmembers') return renderAdminMembers(main);
  if(v==='adminorders') return renderAdminOrders(main);
  if(v==='adminsettings') return renderAdminSettings(main);
  main.innerHTML = '<p>Not found.</p>';
}

function renderBanner(){
  const el = document.getElementById('bannerCarousel');
  if(!el) return;
  el.innerHTML = state.banners.map((b,i)=>`
    <div class="banner-slide ${i===view.bannerIdx?'active':''}">
      <div>
        <h3>${b.title}</h3><p>${b.text}</p>
      </div>
    </div>
  `).join('') + `<div class="banner-dots">${state.banners.map((_,i)=>`<span class="${i===view.bannerIdx?'active':''}" data-i="${i}"></span>`).join('')}</div>`;
  el.querySelectorAll('.banner-dots span').forEach(s=>s.addEventListener('click', ()=>{ view.bannerIdx=+s.dataset.i; renderBanner(); }));
}
setInterval(()=>{
  if(view.current==='browse' && document.getElementById('bannerCarousel')){
    view.bannerIdx = (view.bannerIdx+1)%state.banners.length;
    renderBanner();
  }
}, 4500);

function renderProductGrid(){
  const grid = document.getElementById('productGrid');
  const products = visibleProducts();
  document.querySelector('.section-title .sub').textContent = `${products.length} item${products.length!==1?'s':''} found`;
  if(products.length===0){
    grid.innerHTML = `<div class="empty-state">${crownEmptySVG()}<h3>No products found</h3><p>Try a different search or be the first Queen to sell something like this!</p></div>`;
    return;
  }
  grid.innerHTML = `<div class="grid">${products.map(productCardHTML).join('')}</div>`;
  grid.querySelectorAll('[data-open]').forEach(c=>c.addEventListener('click', ()=>navigate('product', {productDetailId:c.dataset.open})));
  grid.querySelectorAll('[data-addcart]').forEach(b=>b.addEventListener('click', (e)=>{ e.stopPropagation(); addToCart(b.dataset.addcart,1); }));
  grid.querySelectorAll('[data-buynow]').forEach(b=>b.addEventListener('click', (e)=>{ e.stopPropagation(); buyNow(b.dataset.buynow,1); }));
}

function productCardHTML(p){
  const seller = state.members.find(m=>m.id===p.sellerId);
  const trusted = seller && seller.sales>5000;
  return `
  <div class="product-card" data-open="${p.id}">
    <div class="product-img">
      <img src="${pImg(p,400,300)}" alt="${p.title}" loading="lazy">
      <span class="cat-tag">${p.category}</span>
      ${trusted?'<span class="trust-badge">👑 Trusted Queen</span>':''}
    </div>
    <div class="product-body">
      <div class="title">${p.title}</div>
      <div class="seller">by ${p.sellerName}</div>
      <div class="price">${fmt(p.price)}</div>
      <div class="product-actions">
        <button class="btn-sm ghost" data-addcart="${p.id}">Add to Cart</button>
        <button class="btn-sm solid" data-buynow="${p.id}">Buy Now</button>
      </div>
    </div>
  </div>`;
}

function addToCart(productId, qty){
  if(!state.currentUser || state.currentUser.role!=='member'){ requireLogin(); return; }
  const existing = state.cart.find(c=>c.productId===productId);
  if(existing) existing.qty += qty;
  else state.cart.push({productId, qty});
  document.getElementById('cartCount').textContent = cartCount();
  document.getElementById('cartCount').classList.remove('hidden');
  showToast('Added to cart');
}
function buyNow(productId, qty){
  if(!state.currentUser || state.currentUser.role!=='member'){
    pendingAction = ()=>{ addToCart(productId, qty); navigate('checkout'); };
    requireLogin();
    return;
  }
  addToCart(productId, qty);
  navigate('checkout');
}

  const related = state.products.filter(x=>x.category===p.category && x.id!==p.id && x.status==='Live').slice(0,4);
  main.innerHTML = `
    <div class="pd-wrap">
      <div>
        <div class="pd-gallery-main" id="pdMain"><img src="${pImg(p, 800, 600, 0)}" alt="${p.title}"></div>
        <div class="pd-thumbs" id="pdThumbs">
          ${[0,1,2].map(i=>`<div class="${i===0?'active':''}" data-i="${i}"><img src="${pImg(p, 120,120, i)}" alt=""></div>`).join('')}
        </div>
      </div>
      <div class="pd-info">
        <span class="cat-tag" style="position:static;display:inline-block;background:var(--blush);color:var(--burgundy);">${p.category}</span>
        <h1>${p.title}</h1>
        <div class="pd-price">${fmt(p.price)}</div>
        <p style="color:var(--muted);font-size:14px;line-height:1.6;">${p.desc}</p>
        <div class="pd-seller">
          <div class="av">${initials(p.sellerName)}</div>
          <div>
            <div class="name">${p.sellerName} ${seller.sales>5000?'👑 Trusted Queen Seller':''}</div>
            <div class="meta">Member since ${seller.joined} • ${p.sold} sold</div>
          </div>
        </div>
        <div style="font-size:13px;color:${p.stock>0?'var(--success)':'var(--danger)'};font-weight:700;">${p.stock>0?`${p.stock} in stock`:'Out of stock'}</div>
        <div class="qty-selector">
          <button id="qtyMinus">−</button><span id="qtyVal">1</span><button id="qtyPlus">+</button>
        </div>
        <div class="pd-cta">
          <button class="btn-outline" id="addCartBtn">Add to Cart</button>
          <button class="btn-fill" id="buyNowBtn">Buy Now</button>
        </div>
      </div>
    </div>
    ${related.length? `<div class="section-title" style="margin-top:48px;"><h2>You may also love</h2></div><div class="grid">${related.map(productCardHTML).join('')}</div>` : ''}
  `;
  document.getElementById('qtyMinus').onclick=()=>{ pdQty=Math.max(1,pdQty-1); document.getElementById('qtyVal').textContent=pdQty; };
  document.getElementById('qtyPlus').onclick=()=>{ pdQty=Math.min(p.stock||1,pdQty+1); document.getElementById('qtyVal').textContent=pdQty; };
  document.getElementById('addCartBtn').onclick=()=>addToCart(p.id, pdQty);
  document.getElementById('buyNowBtn').onclick=()=>{ buyNow(p.id, pdQty); };
  document.querySelectorAll('#pdThumbs div').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('#pdThumbs div').forEach(x=>x.classList.remove('active'));

  });
  main.querySelectorAll('[data-open]').forEach(c=>c.addEventListener('click', ()=>navigate('product', {productDetailId:c.dataset.open})));
  main.querySelectorAll('[data-addcart]').forEach(b=>b.addEventListener('click', (e)=>{ e.stopPropagation(); addToCart(b.dataset.addcart,1); }));
  main.querySelectorAll('[data-buynow]').forEach(b=>b.addEventListener('click', (e)=>{ e.stopPropagation(); buyNow(b.dataset.buynow,1); }));
}

function renderCart(main){
  if(state.cart.length===0){
    main.innerHTML = `<div class="empty-state">${crownEmptySVG()}<h3>Your cart is empty</h3><p>Browse the marketplace and find something fit for a Queen.</p>
      <button class="btn-primary" style="max-width:220px;margin:18px auto 0;" onclick="navigate('browse')">Start Shopping</button></div>`;
    return;
  }
  main.innerHTML = `
    <div class="section-title"><h2>Your Cart</h2><span class="sub">${cartCount()} item(s)</span></div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:28px;align-items:start;" id="cartGridWrap">
      <div id="cartItems"></div>
      <div class="summary-box">
        <div class="summary-row"><span>Subtotal</span><span>${fmt(cartTotal())}</span></div>
        <div class="summary-row"><span>Platform Commission</span><span style="color:var(--success);font-weight:700;">₹0 (always!)</span></div>
        <div class="summary-row"><span>Delivery</span><span>${cartTotal()>999?'Free':fmt(49)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${fmt(cartTotal() + (cartTotal()>999?0:49))}</span></div>
        <button class="btn-primary" onclick="navigate('checkout')">Proceed to Checkout</button>
      </div>
    </div>
  `;
  if(window.innerWidth<760) document.getElementById('cartGridWrap').style.gridTemplateColumns='1fr';
  renderCartItems();
}
function renderCartItems(){
  const host = document.getElementById('cartItems');
  if(!host) return;
  host.innerHTML = state.cart.map(c=>{
    const p = getProduct(c.productId);
    if(!p) return '';
    return `
    <div class="cart-row">
      <div class="cart-thumb"><img src="${pImg(p,120,120)}" alt="${p.title}"></div>
      <div style="flex:1;min-width:140px;">
        <div class="ci-title">${p.title}</div>
        <div class="ci-seller">Sold by ${p.sellerName}</div>
      </div>
      <div class="cart-qty">
        <button data-dec="${p.id}">−</button><span>${c.qty}</span><button data-inc="${p.id}">+</button>
      </div>
      <div class="cart-price">${fmt(p.price*c.qty)}</div>
      <button class="remove-x" data-rm="${p.id}">Remove</button>
    </div>`;
  }).join('');
  host.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>{ changeQty(b.dataset.inc,1); });
  host.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>{ changeQty(b.dataset.dec,-1); });
  host.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ state.cart = state.cart.filter(c=>c.productId!==b.dataset.rm); renderCart(document.getElementById('mainContent')); });
}
function changeQty(productId, delta){
  const c = state.cart.find(c=>c.productId===productId);
  if(!c) return;
  c.qty += delta;
  if(c.qty<=0) state.cart = state.cart.filter(x=>x.productId!==productId);
  renderCart(document.getElementById('mainContent'));
}

let lastOrderId = null;
function placeOrder(){
  const items = state.cart.map(c=>{ const p=getProduct(c.productId); return {productId:p.id, title:p.title, qty:c.qty, price:p.price, sellerName:p.sellerName}; });
  const total = cartTotal() + (cartTotal()>999?0:49);
  const id = 'ORD-' + (orderCounter++);
  state.orders.unshift({ id, buyerId: state.currentUser.memberId, buyerName: state.currentUser.name, items, total, status:'Placed', date: new Date().toISOString().slice(0,10), payMethod: selectedPay });
  items.forEach(it=>{ const p=getProduct(it.productId); if(p){ p.sold += it.qty; p.stock = Math.max(0,p.stock-it.qty); } });
  state.cart = [];
  lastOrderId = id;
  navigate('orderConfirm');
}

function renderOrderConfirm(main){
  const order = state.orders.find(o=>o.id===lastOrderId) || state.orders[0];
  main.innerHTML = `
    <div class="order-confirm">
      <div class="check">✓</div>
      <h2 style="margin:0 0 6px;">Order Placed!</h2>
      <p style="color:var(--muted);">Your fellow Queens are preparing your order with love.</p>
      <div class="crown-divider"><div class="line"></div>👑<div class="line"></div></div>
      <div style="text-align:left;background:var(--blush);border-radius:14px;padding:18px;">

  view.sellImages = editing ? [0,1,2].map(i=>pImg(editing,120,120,i)) : [];
  main.innerHTML = `
    <div class="section-title"><h2>${editing?'Edit Listing':'Sell a Product'}</h2><span class="sub">List it, and we'll review within 24 hours</span></div>
    <div class="summary-box" style="max-width:680px;">
      <div class="form-field full" style="margin-bottom:14px;">
        <label>Product Images</label>
        <div class="dropzone" id="dropzone"><strong>Click to add images</strong><br>or drag & drop (mock upload — generates a placeholder swatch)</div>
        <div class="img-swatch-row" id="swatchRow"></div>
      </div>
      <div class="form-grid">
        <div class="form-field full"><label>Title</label><input id="sTitle" value="${editing?editing.title:''}" placeholder="e.g. Hand-painted Terracotta Vase"></div>
        <div class="form-field full"><label>Description</label><textarea id="sDesc" rows="3" placeholder="Tell buyers what makes this special...">${editing?editing.desc:''}</textarea></div>
        <div class="form-field"><label>Price (₹)</label><input id="sPrice" type="number" value="${editing?editing.price:''}" placeholder="599"></div>
        <div class="form-field"><label>Stock Quantity</label><input id="sStock" type="number" value="${editing?editing.stock:''}" placeholder="10"></div>
        <div class="form-field full"><label>Category</label>
          <select id="sCategory">${state.categories.map(c=>`<option value="${c}" ${editing&&editing.category===c?'selected':''}>${c}</option>`).join('')}</select>
        </div>
      </div>
      <button class="btn-primary" id="submitListingBtn">${editing?'Save Changes':'Submit for Listing'}</button>
      ${editing? `<p style="font-size:12px;color:var(--muted);margin-top:10px;">Status: <span class="status-pill status-${editing.status}">${editing.status}</span></p>`:''}
    </div>
  `;
  renderSwatches();
  document.getElementById('dropzone').onclick = ()=>{
    view.sellImages.push(imgUrl(CATEGORY_PHOTOS[document.getElementById('sCategory') ? document.getElementById('sCategory').value : 'Fashion'] || CATEGORY_PHOTOS['Fashion'], 120, 120));
    renderSwatches();
  };
  document.getElementById('submitListingBtn').onclick = ()=>submitListing(editing);
}
function renderSwatches(){
  const row = document.getElementById('swatchRow');
  if(!row) return;
  row.innerHTML = view.sellImages.map(g=>`<div class="img-swatch"><img src="${g}" alt=""></div>`).join('');
}
function submitListing(editing){
  const title = document.getElementById('sTitle').value.trim();
  const desc = document.getElementById('sDesc').value.trim();
  const price = parseFloat(document.getElementById('sPrice').value);
  const stock = parseInt(document.getElementById('sStock').value);
  const category = document.getElementById('sCategory').value;
  if(!title || !price || isNaN(stock)){ showToast('Please fill in all required fields'); return; }

  if(editing){
    Object.assign(editing, {title, desc, price, stock, category});
    showToast('Listing updated');
  } else {
    const id = 'P' + (productCounter++);
    state.products.push({
      id, title, desc, price, stock, category,
      sellerId: state.currentUser.memberId, sellerName: state.currentUser.name,
      status:'Pending', sold:0
    });
    showToast('Submitted! Pending admin approval 👑');
  }
  view.sellEditId = null;
  navigate('mylistings');
}

/* ============================================================
   MY LISTINGS
   ============================================================ */
function renderMyListings(main){
  const mine = state.products.filter(p=>p.sellerId===state.currentUser.memberId);
  main.innerHTML = `
    <div class="section-title"><h2>My Listings</h2><span class="sub">${mine.length} product(s)</span></div>
    ${mine.length===0? `<div class="empty-state">${crownEmptySVG()}<h3>No products yet</h3><p>Be the first Queen to sell something beautiful!</p>
      <button class="btn-primary" style="max-width:220px;margin:18px auto 0;" onclick="navigate('sell')">List a Product</button></div>` :
    mine.map(p=>`
      <div class="listing-row">
        <div class="lt"><img src="${pImg(p,100,100)}" alt="${p.title}"></div>
        <div style="flex:1;min-width:160px;">
          <div style="font-weight:700;font-size:14px;">${p.title}</div>
          <div style="font-size:12px;color:var(--muted);">${fmt(p.price)} • ${p.stock} in stock • ${p.sold} sold</div>
          ${p.status==='Rejected' && p.rejectReason ? `<div class="reason-box">Rejected: ${p.rejectReason}</div>`:''}
        </div>
        <span class="status-pill status-${p.status}">${p.status}</span>
        <div class="kebab-actions">
          <button class="btn-mini" data-edit="${p.id}">Edit</button>
          <button class="btn-mini danger" data-del="${p.id}">Delete</button>
        </div>
      </div>
    `).join('')}
  `;
  main.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>navigate('sell',{sellEditId:b.dataset.edit}));
  main.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    state.products = state.products.filter(p=>p.id!==b.dataset.del);
    showToast('Listing deleted');
    renderMyListings(main);
  });
}

/* ============================================================
   PROFILE
   ============================================================ */
function renderProfile(main){
  const member = state.members.find(m=>m.id===state.currentUser.memberId) || {name:state.currentUser.name, sales:0, badges:[], joined:'—'};
  const myOrders = state.orders.filter(o=>o.buyerId===member.id);
  const myListings = state.products.filter(p=>p.sellerId===member.id);
  const monthlyEarn = myListings.reduce((s,p)=> s + p.sold*p.price*0.18, 0); // illustrative slice of recent sales

  main.innerHTML = `
    <div class="profile-hero">
      <div class="profile-av">${initials(member.name)}</div>
      <div>
        <h2 style="margin:0 0 4px;color:#fff;">${member.name}</h2>
        <div style="font-size:12.5px;opacity:.85;">Member ID: ${member.id || 'N/A'} • Joined ${member.joined||'—'}</div>
        <div class="badge-row">
          ${(member.badges||[]).map(b=>`<span class="badge-chip">👑 ${b}</span>`).join('') || '<span class="badge-chip">🌱 New Queen</span>'}
        </div>
      </div>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${fmt(Math.round(monthlyEarn))}</div><div class="lbl">You earned this month</div></div>
      <div class="stat-card"><div class="num">${myListings.length}</div><div class="lbl">Active Listings</div></div>
      <div class="stat-card"><div class="num">${myOrders.length}</div><div class="lbl">Orders Placed</div></div>
      <div class="stat-card"><div class="num">0%</div><div class="lbl">Commission Always</div></div>
    </div>
    <div class="summary-box">
      <h3 style="margin-top:0;">Account Details</h3>
      <div class="summary-row"><span>Name</span><span>${state.currentUser.name}</span></div>
      <div class="summary-row"><span>Email</span><span>${state.currentUser.email}</span></div>
      <div class="summary-row"><span>Role</span><span>Member</span></div>
    </div>
  `;
}

/* ============================================================
   ===================== ADMIN VIEWS =========================
   ============================================================ */
function renderAdminDash(main){
  const totalMembers = state.members.length;
  const totalProducts = state.products.length;
  const totalOrders = state.orders.length;
  const pending = state.products.filter(p=>p.status==='Pending').length;

  const catCounts = {};
  state.categories.forEach(c=>catCounts[c]=0);
  state.products.forEach(p=>{ if(catCounts[p.category]!==undefined) catCounts[p.category]++; });
  const maxC = Math.max(1,...Object.values(catCounts));

  main.innerHTML = `
    <div class="section-title"><h2>Admin Dashboard</h2><span class="sub">QueensMart platform overview</span></div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${totalMembers}</div><div class="lbl">Total Members</div></div>
      <div class="stat-card"><div class="num">${totalProducts}</div><div class="lbl">Total Products Listed</div></div>
      <div class="stat-card"><div class="num">${totalOrders}</div><div class="lbl">Total Orders</div></div>
      <div class="stat-card"><div class="num" style="color:var(--warn);">${pending}</div><div class="lbl">Pending Approvals</div></div>
    </div>
    <div class="summary-box">
      <h3 style="margin-top:0;">Category-wise Listings</h3>
      <div class="bar-chart">
        ${Object.entries(catCounts).map(([c,n])=>`
          <div class="bar-wrap">
            <div class="bval">${n}</div>
            <div class="bar" style="height:${(n/maxC*140)||4}px;"></div>
            <div class="blabel">${c}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderAdminMod(main){
  const tab = view.modTab;
  const filtered = state.products.filter(p=>p.status===tab);
  main.innerHTML = `
    <div class="section-title"><h2>Product Moderation</h2><span class="sub">Review and approve member listings</span></div>
    <div class="filter-tabs" id="modFilterTabs">
      ${['Pending','Live','Rejected'].map(t=>`<button class="${tab===t?'active':''}" data-t="${t}">${t}</button>`).join('')}
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Product</th><th>Seller</th><th>Category</th><th>Price</th><th>Stock</th>${tab==='Pending'?'<th>Actions</th>':'<th>Status</th>'}</tr></thead>
        <tbody>
          ${filtered.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px;">No ${tab.toLowerCase()} products.</td></tr>`:''}
          ${filtered.map(p=>`
            <tr>
              <td><span class="mini-thumb"><img src="${pImg(p,80,80)}" alt=""></span>${p.title}</td>
              <td>${p.sellerName}</td>
              <td>${p.category}</td>
              <td>${fmt(p.price)}</td>
              <td>${p.stock}</td>
              <td>
                ${tab==='Pending' ? `
                  <button class="btn-mini" data-view="${p.id}">View</button>
                  <button class="btn-mini" style="border-color:#BFE3CB;color:var(--success);" data-approve="${p.id}">Approve</button>
                  <button class="btn-mini danger" data-reject="${p.id}">Reject</button>
                ` : `<span class="status-pill status-${p.status}">${p.status}</span>`}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.querySelectorAll('#modFilterTabs button').forEach(b=>b.onclick=()=>navigate('adminmod',{modTab:b.dataset.t}));
  main.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>openProductPreviewModal(b.dataset.view));
  main.querySelectorAll('[data-approve]').forEach(b=>b.onclick=()=>{
    const p = getProduct(b.dataset.approve); p.status='Live'; showToast('Product approved & live');
    renderAdminMod(main);
  });
  main.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>openRejectModal(b.dataset.reject));
}

function openProductPreviewModal(id){
  const p = getProduct(id);
  document.getElementById('modalHost').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div style="height:160px;border-radius:14px;overflow:hidden;margin-bottom:14px;"><img src="${pImg(p,500,320)}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
        <h3>${p.title}</h3>
        <p style="color:var(--muted);font-size:13.5px;">${p.desc}</p>
        <div class="summary-row"><span>Price</span><span>${fmt(p.price)}</span></div>
        <div class="summary-row"><span>Stock</span><span>${p.stock}</span></div>
        <div class="summary-row"><span>Seller</span><span>${p.sellerName}</span></div>
        <div class="summary-row"><span>Category</span><span>${p.category}</span></div>
      </div>
    </div>
  `;
}
function openRejectModal(id){
  const p = getProduct(id);
  document.getElementById('modalHost').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3>Reject "${p.title}"</h3>
        <div class="form-field"><label>Reason for rejection</label><textarea id="rejReason" rows="3" placeholder="e.g. Image quality too low, price mismatch..."></textarea></div>
        <button class="btn-primary" id="confirmRejectBtn">Confirm Rejection</button>
      </div>
    </div>
  `;
  document.getElementById('confirmRejectBtn').onclick = ()=>{
    const reason = document.getElementById('rejReason').value.trim() || 'Does not meet listing guidelines.';
    p.status='Rejected'; p.rejectReason=reason;
    closeModal();
    showToast('Product rejected');
    renderAdminMod(document.getElementById('mainContent'));
  };
}

function renderAdminMembers(main){
  main.innerHTML = `
    <div class="section-title"><h2>Member Management</h2><span class="sub">${state.members.length} registered Queens</span></div>
    <div class="toolbar"><div class="search-box"><span>🔎</span><input id="memberSearch" placeholder="Search members..."></div></div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Member</th><th>ID</th><th>Email</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="memberTbody"></tbody>
    </table></div>
  `;
  const draw = (q='')=>{
    const rows = state.members.filter(m=>m.name.toLowerCase().includes(q.toLowerCase()));
    document.getElementById('memberTbody').innerHTML = rows.map(m=>`
      <tr>
        <td><span class="mini-thumb" style="background:${colorFor(m.id)};border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${initials(m.name)}</span>${m.name}</td>
        <td>${m.id}</td><td>${m.email}</td><td>${m.joined}</td>
        <td><span class="status-pill status-${m.status}">${m.status}</span></td>
        <td><button class="btn-mini ${m.status==='Active'?'danger':''}" data-toggle="${m.id}">${m.status==='Active'?'Suspend':'Activate'}</button>
        <button class="btn-mini" data-view="${m.id}">View</button></td>
      </tr>
    `).join('');
    document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{
      const m = state.members.find(x=>x.id===b.dataset.toggle);
      m.status = m.status==='Active'?'Suspended':'Active';
      showToast(`${m.name} ${m.status==='Active'?'activated':'suspended'}`);
      draw(document.getElementById('memberSearch').value);
    });
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>openMemberModal(b.dataset.view));
  };
  draw();
  document.getElementById('memberSearch').addEventListener('input', e=>draw(e.target.value));
}
function openMemberModal(id){
  const m = state.members.find(x=>x.id===id);
  const listings = state.products.filter(p=>p.sellerId===id);
  document.getElementById('modalHost').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3>${m.name}</h3>
        <div class="summary-row"><span>Member ID</span><span>${m.id}</span></div>
        <div class="summary-row"><span>Email</span><span>${m.email}</span></div>
        <div class="summary-row"><span>Joined</span><span>${m.joined}</span></div>
        <div class="summary-row"><span>Status</span><span>${m.status}</span></div>
        <div class="summary-row"><span>Total Sales</span><span>${fmt(m.sales)}</span></div>
        <div class="summary-row"><span>Listings</span><span>${listings.length}</span></div>
      </div>
    </div>
  `;
}

function renderAdminOrders(main){
  main.innerHTML = `
    <div class="section-title"><h2>Order Oversight</h2><span class="sub">${state.orders.length} orders across the platform</span></div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Order ID</th><th>Buyer</th><th>Seller(s)</th><th>Amount</th><th>Date</th><th>Status</th><th>Update</th></tr></thead>
      <tbody>
        ${state.orders.map(o=>`
          <tr>
            <td>${o.id}</td>
            <td>${o.buyerName}</td>
            <td>${[...new Set(o.items.map(i=>i.sellerName))].join(', ')}</td>
            <td>${fmt(o.total)}</td>
            <td>${o.date}</td>
            <td><span class="status-pill status-${o.status}">${o.status}</span></td>
            <td>
              <select class="styled" data-order="${o.id}" style="padding:6px 10px;font-size:12px;">
                ${['Placed','Shipped','Delivered'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
  `;
  main.querySelectorAll('[data-order]').forEach(sel=>sel.onchange=()=>{
    const o = state.orders.find(x=>x.id===sel.dataset.order);
    o.status = sel.value;
    showToast(`${o.id} marked as ${o.status}`);
  });
}

function renderAdminSettings(main){
  main.innerHTML = `
    <div class="section-title"><h2>Settings</h2><span class="sub">Manage categories & homepage banners</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;" id="setGrid">
      <div class="summary-box">
        <h3 style="margin-top:0;">Categories</h3>
        <div id="catList"></div>
        <div style="display:flex;gap:8px;margin-top:14px;">
          <input id="newCat" placeholder="New category name" style="flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid #ECD9DD;">
          <button class="btn-mini" id="addCatBtn">Add</button>
        </div>
      </div>
      <div class="summary-box">
        <h3 style="margin-top:0;">Homepage Banners</h3>
        <div id="bannerList"></div>
        <div class="form-field" style="margin-top:10px;"><label>Title</label><input id="newBTitle" placeholder="Banner title"></div>
        <div class="form-field" style="margin-top:8px;"><label>Text</label><input id="newBText" placeholder="Banner description"></div>
        <button class="btn-mini" id="addBannerBtn" style="margin-top:10px;">Add Banner</button>
      </div>
    </div>
  `;
  if(window.innerWidth<760) document.getElementById('setGrid').style.gridTemplateColumns='1fr';
  drawCats(); drawBanners();
  document.getElementById('addCatBtn').onclick=()=>{
    const v = document.getElementById('newCat').value.trim();
    if(v && !state.categories.includes(v)){ state.categories.push(v); showToast('Category added'); drawCats(); }
  };
  document.getElementById('addBannerBtn').onclick=()=>{
    const t=document.getElementById('newBTitle').value.trim(), x=document.getElementById('newBText').value.trim();
    if(t && x){ state.banners.push({title:t,text:x}); showToast('Banner added'); drawBanners();
      document.getElementById('newBTitle').value=''; document.getElementById('newBText').value=''; }
  };
}
function drawCats(){
  document.getElementById('catList').innerHTML = state.categories.map(c=>`
    <div class="listing-row" style="padding:10px 14px;">
      <span style="flex:1;font-weight:600;font-size:13.5px;">${c}</span>
      <button class="btn-mini danger" data-rmcat="${c}">Remove</button>
    </div>`).join('');
  document.querySelectorAll('[data-rmcat]').forEach(b=>b.onclick=()=>{
    state.categories = state.categories.filter(c=>c!==b.dataset.rmcat);
    showToast('Category removed'); drawCats();
  });
}
function drawBanners(){
  document.getElementById('bannerList').innerHTML = state.banners.map((b,i)=>`
    <div class="listing-row" style="padding:10px 14px;">
      <span style="flex:1;"><strong style="font-size:13px;">${b.title}</strong><br><span style="font-size:11.5px;color:var(--muted);">${b.text}</span></span>
      <button class="btn-mini danger" data-rmb="${i}">Remove</button>
    </div>`).join('');
  document.querySelectorAll('[data-rmb]').forEach(b=>b.onclick=()=>{
    state.banners.splice(+b.dataset.rmb,1);
    showToast('Banner removed'); drawBanners();
  });
}

applyRoleUI();
navigate('landing');

</script>
